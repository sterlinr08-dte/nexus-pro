name: Aplicar rediseño visual Prefactura 2.5

on:
  push:
    branches:
      - feat/prefactura-visual-2-5
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-prefactura:
    if: ${{ !contains(github.event.head_commit.message || '', '[prefactura-patch]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama
        uses: actions/checkout@v4
        with:
          ref: feat/prefactura-visual-2-5
          fetch-depth: 0

      - name: Aplicar parche visual
        run: python3 .github/scripts/apply_prefactura_visual.py

      - name: Validar archivos
        run: |
          node --check parches.js
          python3 -m json.tool version.json >/dev/null
          grep -q "const APP_VERSION='48.83';" index.html
          grep -q "NEXUS PREFactura Visual 2.5 — v48.83" parches.js

      - name: Confirmar cambios en la rama
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add parches.js index.html version.json
          if git diff --cached --quiet; then
            echo "No hay cambios nuevos para confirmar."
          else
            git commit -m "POS: rediseño visual Prefactura 2.5 [prefactura-patch]"
            git push origin HEAD:feat/prefactura-visual-2-5
          fi

# trigger: ejecución solicitada por el propietario
