name: Aplicar corrección visual Prefactura 48.84

on:
  push:
    branches:
      - fix/prefactura-visual-48-84
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-prefactura:
    if: ${{ !contains(github.event.head_commit.message || '', '[prefactura-patch]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama
        uses: actions/checkout@v4
        with:
          ref: fix/prefactura-visual-48-84
          fetch-depth: 0

      - name: Aplicar corrección visual
        run: python3 .github/scripts/apply_prefactura_visual.py

      - name: Validar archivos
        run: |
          node --check parches.js
          python3 -m json.tool version.json >/dev/null
          grep -q "const APP_VERSION='48.84';" index.html
          grep -q "NEXUS PREFactura Visual 2.5 — v48.84" parches.js
          grep -q "nx-prefactura-real" parches.js

      - name: Confirmar cambios en la rama
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add parches.js index.html version.json
          if git diff --cached --quiet; then
            echo "No hay cambios nuevos para confirmar."
          else
            git commit -m "POS: corregir alcance visual Prefactura 48.84 [prefactura-patch]"
            git push origin HEAD:fix/prefactura-visual-48-84
          fi
