name: Aplicar corrección móvil Prefactura 48.86

on:
  push:
    branches:
      - ui/prefactura-2-5-sprint-1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-prefactura-mobile:
    if: ${{ !contains(github.event.head_commit.message || '', '[prefactura-mobile-2486]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama
        uses: actions/checkout@v4
        with:
          ref: ui/prefactura-2-5-sprint-1
          fetch-depth: 0

      - name: Aplicar corrección móvil
        run: python3 .github/scripts/apply_prefactura_mobile_2486.py

      - name: Validar archivos
        run: |
          node --check parches.js
          python3 -m json.tool version.json >/dev/null
          grep -q "const APP_VERSION='48.86';" index.html
          grep -q "NEXUS PREFactura Mobile Fix — v48.86" parches.js

      - name: Confirmar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add parches.js index.html version.json
          if git diff --cached --quiet; then
            echo "No hay cambios nuevos para confirmar."
          else
            git commit -m "POS: corregir vista móvil Prefactura 48.86 [prefactura-mobile-2486]"
            git push origin HEAD:ui/prefactura-2-5-sprint-1
          fi
