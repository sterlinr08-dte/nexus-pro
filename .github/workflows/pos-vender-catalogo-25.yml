name: POS Vender Catalogo 2.5

on:
  push:
    branches:
      - ui/pos-vender-catalogo-2-5
    paths:
      - '.github/scripts/apply_pos_vender_catalogo_25.py'
      - '.github/workflows/pos-vender-catalogo-25.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ui/pos-vender-catalogo-2-5
          fetch-depth: 0

      - name: Apply visual patch
        run: python3 .github/scripts/apply_pos_vender_catalogo_25.py

      - name: Validate JavaScript
        run: node --check parches.js

      - name: Commit generated changes
        run: |
          if git diff --quiet -- parches.js; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add parches.js
          git commit -m "feat(pos): apply compact Vender catalog 2.5"
          git push origin HEAD:ui/pos-vender-catalogo-2-5
