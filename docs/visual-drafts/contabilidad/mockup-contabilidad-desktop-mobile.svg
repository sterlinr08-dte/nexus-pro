    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .t{font-family:'Plus Jakarta Sans',Arial,sans-serif;fill:#0f172a}
      .muted{fill:#64748b}.white{fill:#fff}.blue{fill:#2563eb}.green{fill:#16a34a}.red{fill:#dc2626}.purple{fill:#6366f1}
      .h1{font-size:28px;font-weight:700}.h2{font-size:18px;font-weight:700}.h3{font-size:14px;font-weight:700}.body{font-size:13px;font-weight:500}.small{font-size:11px;font-weight:500}.num{font-size:24px;font-weight:700}
      .card{fill:#fff;stroke:#e2e8f0;stroke-width:1}.soft{fill:#f8fafc}.line{stroke:#e2e8f0;stroke-width:1}.nav{font-size:13px;font-weight:600;fill:#dbeafe}
    </style>
