.nexus-mobile-nav button {
  background: transparent;

  color: #b9c8df;
  font-size: 11px !important;
  display: flex;

  gap: 4px;
  align-items: center;
  justify-content: center;

.nexus-mobile-nav button span {

.nexus-mobile-nav button.active,

}

.nexus-mobile-fab {
  position: fixed;
  left: 50%;
  bottom: 48px;
  transform: translateX(-50%);
  width: 62px;
  height: 62px;
  border-radius: 50%;
  z-index: 99991;
  border: 1px solid rgba(255,255,255,.25);
  background: linear-gradient(135deg, #1668ff, #7b4dff);
  color: #fff;
  font-size: 34px !important;
  align-items: center;
  justify-content: center;
  box-shadow: 0 16px 36px rgba(22,104,255,.45);
  cursor: pointer;
}

.nexus-mobile-actions-backdrop,
.nexus-mobile-menu-backdrop {
  position: fixed;
  inset: 0;
  z-index: 99992;
  background: rgba(0,0,0,.62);
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: .22s ease;
}

.nexus-mobile-actions-backdrop.show,
.nexus-mobile-menu-backdrop.show {
  opacity: 1;
  pointer-events: auto;
}

.nexus-mobile-sheet {
  width: 100%;

  background: linear-gradient(180deg, #102033, #071221);

.nexus-mobile-grid {

.nexus-mobile-action {

  padding: 12px 14px;
  display: flex;
  gap: 12px;

.nexus-mobile-action b {

.nexus-mobile-action small {

</style>

<div class="nexus-mobile-actions-backdrop" id="nexusMobileActions">

  <div class="nexus-mobile-sheet">
    <h3>☰ Más módulos</h3>
    <div class="nexus-mobile-grid">
      <button class="nexus-mobile-action" data-mobile-go="Pólizas">🛡️ <div><b>Pólizas</b><small>Vigencias y certificados</small></div></button>
      <button class="nexus-mobile-action" data-mobile-go="Historial">🕘 <div><b>Historial</b><small>Pagos y movimientos</small></div></button>
      <button class="nexus-mobile-action" data-mobile-go="Reportes">📊 <div><b>Reportes</b><small>DGII, ARS y Excel</small></div></button>
      <button class="nexus-mobile-action" data-mobile-go="Empresas">🏢 <div><b>Empresas</b><small>Empresas cotizantes</small></div></button>
      <button class="nexus-mobile-action" data-mobile-go="Usuarios">👥 <div><b>Usuarios</b><small>Accesos del sistema</small></div></button>
      <button class="nexus-mobile-action" data-mobile-go="Configuración">⚙️ <div><b>Configuración</b><small>Ajustes generales</small></div></button>
    </div>
    <button class="nexus-mobile-close" data-mobile-close>Cancelar</button>
  </div>
</div>

<button class="nexus-mobile-fab" id="nexusMobileFab" aria-label="Acciones rápidas">+</button>

<div class="nexus-mobile-nav">
  <button data-mobile-go="Dashboard" class="active"><span>🏠</span>Inicio</button>
  <button data-mobile-go="Clientes"><span>👥</span>Clientes</button>
  <button data-mobile-go="Facturas"><span>🧾</span>Facturas</button>
  <button data-mobile-go="Cobros"><span>💵</span>Cobros</button>
  <button id="nexusMobileMenuBtn"><span>☰</span>Menú</button>
</div>

<script>
(function () {
  "use strict";

  function normalizeText(text) {
    return String(text || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .trim();
  }

  function clickByText(label) {
    var target = normalizeText(label);
    var items = Array.from(document.querySelectorAll("button, a, [role='button'], .nav-item, .menu-item, li"));

    var found = items.find(function (el) {
      var txt = normalizeText(el.innerText || el.textContent || "");
      return txt === target || txt.includes(target);
    });

    if (found) {
      found.click();
      return true;
    }

    return false;
  }

  function safeOpen(label) {
    var map = {
      "Dashboard": ["Dashboard", "Inicio"],
      "Clientes": ["Clientes"],
      "Facturas": ["Facturas"],
      "Cobros": ["Cobros", "Registrar cobro"],
      "Pólizas": ["Pólizas", "Polizas"],
      "Historial": ["Historial", "Historial de pagos"],
      "Reportes": ["Reportes", "DGII", "ARS"],
      "Empresas": ["Empresas"],
      "Usuarios": ["Usuarios"],
      "Configuración": ["Configuración", "Apariencia", "Empresa y tarifas"],
      "WhatsApp": ["WhatsApp masivo", "Generar WA masivo"]
    };

    var options = map[label] || [label];

    for (var i = 0; i < options.length; i++) {
      if (clickByText(options[i])) return true;
    }

    console.warn("NEXUS MOBILE: no encontré módulo:", label);
    return false;
  }

  function openActions() {
    document.getElementById("nexusMobileActions")?.classList.add("show");
  }

  function openMenu() {
    document.getElementById("nexusMobileMenu")?.classList.add("show");
  }

  function closeSheets() {
    document.querySelectorAll(".nexus-mobile-actions-backdrop, .nexus-mobile-menu-backdrop")
      .forEach(function (el) { el.classList.remove("show"); });
  }

  function setActive(btn) {
    document.querySelectorAll(".nexus-mobile-nav button").forEach(function (b) {
      b.classList.remove("active");
    });
    if (btn) btn.classList.add("active");
  }

  document.addEventListener("click", function (e) {
    var navBtn = e.target.closest("[data-mobile-go]");
    var actionBtn = e.target.closest("[data-mobile-action]");
    var closeBtn = e.target.closest("[data-mobile-close]");

    if (navBtn) {
      var label = navBtn.getAttribute("data-mobile-go");
      closeSheets();
      safeOpen(label);
      if (navBtn.closest(".nexus-mobile-nav")) setActive(navBtn);
    }

    if (actionBtn) {
      var action = actionBtn.getAttribute("data-mobile-action");
      closeSheets();

      if (action === "new-client") {
        clickByText("Nuevo cliente") || safeOpen("Clientes");
      }

      if (action === "invoice") {
        clickByText("Nueva factura") || safeOpen("Facturas");
      }

      if (action === "payment") {
        clickByText("Registrar cobro") || safeOpen("Cobros");
      }

      if (action === "whatsapp") {
        safeOpen("WhatsApp");
      }

      if (action === "policy") {
        safeOpen("Pólizas");
      }
    }

    if (closeBtn) closeSheets();

    if (e.target.id === "nexusMobileActions" || e.target.id === "nexusMobileMenu") {
      closeSheets();
    }
  });

  document.getElementById("nexusMobileFab")?.addEventListener("click", openActions);
  document.getElementById("nexusMobileMenuBtn")?.addEventListener("click", function () {
    setActive(this);
    openMenu();
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closeSheets();
  });

  function mobilePolishText() {
    document.querySelectorAll("body *").forEach(function (el) {
      if (!el.childNodes || el.childNodes.length !== 1) return;
      var txt = el.textContent || "";

      if (txt.trim() === "0 ERROR") el.textContent = "Sistema sin errores";
      if (txt.includes("⌘K") && txt.includes("Instalar")) el.textContent = "Instalar app";
      if (txt.trim() === "Clientes0") el.textContent = "Clientes";
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", mobilePolishText);
  } else {
    mobilePolishText();
  }
})();
</script>
